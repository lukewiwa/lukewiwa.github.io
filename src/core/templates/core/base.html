{% load static navbar %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charSet="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>
            {% block title %}
                Wiwa
            {% endblock title %}
        </title>
        <link rel="stylesheet" href="{% static "frontend/index.css" %}">
        <link rel="stylesheet"
              href="//cdnjs.cloudflare.com/ajax/libs/highlight.js/11.4.0/styles/github.min.css" />
        <link rel="stylesheet"
              href="//cdnjs.cloudflare.com/ajax/libs/highlight.js/11.4.0/styles/github-dark.min.css"
              media="screen and (prefers-color-scheme: dark)" />
    </head>
    <body>
        {% navbar %}
        {% block body %}
            <main class="{% block main_css %}pt-8 max-w-3xl mx-auto px-4{% endblock main_css %}">
                {% block main %}
                {% endblock main %}
            </main>
        {% endblock body %}
    </body>
</html>
